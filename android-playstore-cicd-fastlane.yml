
name: Android Play Store CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track to deploy to"
        required: true
        default: "alpha"
        type: choice
        options:
          - alpha
          - internal
          - beta
          - production

concurrency:
  group: play-store-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to Play Store
    runs-on: ubuntu-latest
    env:
      PLAY_STORE_TRACK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.track || 'alpha' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          channel: stable
          cache: true # Uses internal action logic for Pub cache optimization

      # Fetch dependencies early to hydrate the cache and validate the pubspec
      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      - name: Extract version from pubspec.yaml
        id: build_meta
        shell: bash
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | sed 's/^version:[[:space:]]*//' | tr -d '\r\n ')
          BUILD_NAME=$(echo "$VERSION_LINE" | cut -d'+' -f1 | tr -d ' ')
          BUILD_NUMBER=$(echo "$VERSION_LINE" | cut -d'+' -f2 | tr -d ' ')

          if [[ -z "$BUILD_NAME" ]]; then
            echo "❌ Failed to extract version name from pubspec.yaml"
            exit 1
          fi

          if [[ -z "$BUILD_NUMBER" ]]; then
            echo "❌ Failed to extract version code from pubspec.yaml (expected format: x.y.z+NN)"
            exit 1
          fi

          if ! [[ "$BUILD_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ BUILD_NAME '$BUILD_NAME' is not valid semver (x.y.z)"
            exit 1
          fi

          if ! [[ "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "❌ BUILD_NUMBER '$BUILD_NUMBER' is not a valid integer"
            exit 1
          fi

          echo "✅ Version: $BUILD_NAME+$BUILD_NUMBER"
          echo "build_name=$BUILD_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Decode upload keystore
        shell: bash
        run: |
          if [ -z "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" ]; then
            echo "❌ ANDROID_UPLOAD_KEYSTORE_BASE64 is empty."
            exit 1
          fi
          printf "%s" "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | tr -d '\r\n ' | base64 --decode > "$GITHUB_WORKSPACE/android/upload-keystore.jks"
          test -s "$GITHUB_WORKSPACE/android/upload-keystore.jks"

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=$GITHUB_WORKSPACE/android/upload-keystore.jks
          EOF

      - name: Build and deploy with Fastlane
        working-directory: android
        env:
          BUILD_NAME: ${{ steps.build_meta.outputs.build_name }}
          BUILD_NUMBER: ${{ steps.build_meta.outputs.build_number }}
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        run: bundle exec fastlane deploy

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Remove keystore
        if: always()
        run: rm -f android/upload-keystore.jks android/key.properties
