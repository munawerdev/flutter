name: Android Play Store CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  build-and-deploy:
    name: Build & Deploy to Play Store
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        id: build_meta
        shell: bash
        run: |
          BUILD_NAME=$(grep '^version:' pubspec.yaml \
            | sed 's/^version:[[:space:]]*//' \
            | cut -d'+' -f1 \
            | tr -d '\r\n ')

          if [[ -z "$BUILD_NAME" ]]; then
            echo "❌ Failed to extract version from pubspec.yaml"
            exit 1
          fi

          if ! [[ "$BUILD_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ BUILD_NAME '$BUILD_NAME' is not valid semver (x.y.z)"
            exit 1
          fi

          echo "✅ Version: $BUILD_NAME+${{ github.run_number }}"
          echo "build_name=$BUILD_NAME" >> "$GITHUB_OUTPUT"

      - name: Decode upload keystore
        shell: bash
        run: |
          if [ -z "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" ]; then
            echo "❌ ANDROID_UPLOAD_KEYSTORE_BASE64 is empty."
            exit 1
          fi
          printf "%s" "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | tr -d '\r\n ' | base64 --decode > "$GITHUB_WORKSPACE/android/upload-keystore.jks"
          test -s "$GITHUB_WORKSPACE/android/upload-keystore.jks"

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=$GITHUB_WORKSPACE/android/upload-keystore.jks
          EOF

      - name: Build release app bundle
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.build_meta.outputs.build_name }} \
            --build-number=${{ github.run_number }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.citi.cotch
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'production' }}
          status: completed

      - name: Remove keystore
        if: always()
        run: rm -f android/upload-keystore.jks android/key.properties
